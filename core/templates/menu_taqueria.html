{% extends 'base.html' %}
{% load static %}
{% block title %}Menú Taqueria donde Juancho - GastroWeb{% endblock %}
{% block content %}

<section class="bg-white min-h-screen px-16 py-12">
    <h2 class="text-4xl font-black text-gray-900 text-center mb-2">Menú Taqueria donde Juancho</h2>
    <p class="text-gray-400 text-center text-sm mb-12">Los mejores restaurantes de comida rapida para ti</p>

    <!-- FILA 1 -->
<div class="grid grid-cols-3 gap-6 max-w-3xl mx-auto mb-6">

    <div class="bg-[#D4D956] rounded-3xl cursor-pointer hover:-translate-y-2 transition-all p-3">
        <div class="h-40 mb-3">
                <img src="{% static 'img/Tacos.jpeg' %}" alt="Tacos" class="w-full h-full object-contain rounded-2xl">

        </div>
        <div class="border-t-2 border-black mb-3"></div>
      <button onclick="window.location='{% url 'taco_carne' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">Taco de carne</button>
    </div>

    <div class="bg-[#D4D956] rounded-3xl cursor-pointer hover:-translate-y-2 transition-all p-3">
        <div class="h-40 mb-3">
        <div class="h-40 mb-3">
            <img src="{% static 'img/dorilocos.jpeg' %}" alt="Dorilocos" class="w-full h-full object-contain rounded-2xl">
        </div>
        </div>
        <div class="border-t-2 border-black mb-3"></div>
        <button onclick="window.location='{% url 'dorilocos' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">
            Dorilocos
        </button>

    </div>

    <div class="bg-[#D4D956] rounded-3xl cursor-pointer hover:-translate-y-2 transition-all p-3">
        <div class="h-40 mb-3">
            <!-- imagen aqui -->
        </div>
        <div class="border-t-2 border-black mb-3"></div>
       <button onclick="window.location='{% url 'picadas_mexicanas' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">Picadas Mexicanas</button>
    </div>

</div>

<!-- FILA 2 CENTRADA -->
<div class="flex justify-center gap-6 max-w-3xl mx-auto">

    <div class="bg-[#D4D956] rounded-3xl cursor-pointer hover:-translate-y-2 transition-all p-3 w-[calc(33.33%-12px)]">
        <div class="h-40 mb-3">
            <!-- imagen aqui -->
        </div>
        <div class="border-t-2 border-black mb-3"></div>
     <button onclick="window.location='{% url 'burritos' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">Burritos</button>
    </div>

    <div class="bg-[#D4D956] rounded-3xl cursor-pointer hover:-translate-y-2 transition-all p-3 w-[calc(33.33%-12px)]">
        <div class="h-40 mb-3">
            <!-- imagen aqui -->
        </div>
        <div class="border-t-2 border-black mb-3"></div>
         <button onclick="window.location='{% url 'maruchas' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">Maruchas</button>
    </div>

</div>
</section>

{% endblock %}
