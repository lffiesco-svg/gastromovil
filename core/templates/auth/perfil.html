{% extends 'base.html' %}
{% load static %}
{% block title %}Mi Perfil - GastroWeb{% endblock %}
{% block content %}

<section class="min-h-screen bg-gray-100 px-6 md:px-16 py-12">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-10">

        <!-- ENCABEZADO -->
        <div class="flex items-center gap-6 mb-8">
            <div class="w-20 h-20 rounded-full flex items-center justify-center text-white font-black text-3xl bg-gradient-to-r from-[#FF8C00] to-[#e67e00]">
                LF
            </div>
            <div>
                <h2 class="text-3xl font-black text-gray-900">Luis Felipe</h2>
                <p class="text-gray-500">gastromovil@gmail.com</p>
            </div>
        </div>

        <hr class="mb-6">

        <!-- FORMULARIO -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

            <div>
                <label class="text-gray-700 text-xs font-bold uppercase tracking-wider mb-2 block">Nombre</label>
                <input id="nombre" type="text" value="Luis Felipe" disabled class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 disabled:opacity-60 transition-colors">
            </div>

            <div>
                <label class="text-gray-700 text-xs font-bold uppercase tracking-wider mb-2 block">Apellido</label>
                <input id="apellido" type="text" value="Fiesco" disabled class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 disabled:opacity-60 transition-colors">
            </div>

            <div class="col-span-full">
                <label class="text-gray-700 text-xs font-bold uppercase tracking-wider mb-2 block">Correo Electrónico</label>
                <input id="email" type="email" value="gastromovil@gmail.com" disabled class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 disabled:opacity-60 transition-colors">
            </div>

            <div class="col-span-full">
                <label class="text-gray-700 text-xs font-bold uppercase tracking-wider mb-2 block">Teléfono</label>
                <input id="telefono" type="tel" value="+57 320 846 0726" disabled class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 disabled:opacity-60 transition-colors">
            </div>

        </div>

        <!-- BOTONES -->
        <div class="mt-8 flex flex-col gap-3">
            <button id="editarBtn" onclick="toggleEditar()" class="w-full bg-[#FF8C00] text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase hover:bg-[#e67e00] transition-colors">
                <i class="fas fa-user-pen mr-2"></i> Editar Perfil
            </button>
            <button id="guardarBtn" onclick="guardarCambios()" class="w-full bg-green-500 text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase hover:bg-green-600 transition-colors hidden">
                <i class="fas fa-floppy-disk mr-2"></i> Guardar Cambios
            </button>
            <button onclick="abrirModalEliminar()" class="w-full bg-white text-red-500 py-4 rounded-xl font-black text-sm tracking-widest uppercase hover:bg-red-50 transition-colors border border-red-200">
                <i class="fas fa-trash mr-2"></i> Eliminar Cuenta
            </button>
            <button class="w-full bg-white text-gray-500 py-4 rounded-xl font-black text-sm tracking-widest uppercase hover:bg-gray-50 transition-colors border border-gray-200">
                <i class="fas fa-right-from-bracket mr-2"></i> Cerrar Sesión
            </button>
        </div>

    </div>
</section>

<!-- MODAL ELIMINAR CUENTA -->
<div id="modal-eliminar" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full">
        <div class="text-center mb-6">
            <div class="mx-auto w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-4">
                <i class="fas fa-triangle-exclamation text-red-600 text-2xl"></i>
            </div>
            <h3 class="text-2xl font-black text-gray-900 mb-3">¿Eliminar cuenta?</h3>
            <p class="text-gray-500 text-sm">Esta acción es permanente y no se puede deshacer.</p>
        </div>
        <div class="flex gap-4">
            <button onclick="cerrarModalEliminar()" class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-xl font-bold hover:bg-gray-200 transition-colors">
                Cancelar
            </button>
            <button class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition-colors">
                Sí, eliminar
            </button>
        </div>
    </div>
</div>

<script src="{% static 'js/perfil.js' %}"></script>

{% endblock %}
