{% extends 'base.html' %}
{% load static %}
{% block title %}Recuperar Contraseña - GastroWeb{% endblock %}
{% block content %}

<section class="min-h-screen bg-gray-100 flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-md">

        <div class="bg-white rounded-2xl shadow-md p-8">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-linear-to-br from-[#DC2626] to-[#FF4500] rounded-full mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-black text-gray-900 mb-2">Recuperar Contraseña</h2>
                <p class="text-gray-500 text-sm">Ingresa tu correo para recibir un código de verificación</p>
            </div>

            <form id="formSolicitar" class="flex flex-col gap-5" action="{% url 'enviar_codigo_web' %}" method="POST">
                {% csrf_token %} <div>
                    <label class="text-gray-700 text-xs font-bold uppercase tracking-wider mb-2 block">
                        <i class="fas fa-envelope mr-2 text-[#DC2626]"></i>Correo Electrónico
                    </label>
                    <input type="email" name="email" id="email" required placeholder="tu@email.com" 
                        class="w-full bg-gray-50 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 focus:border-[#DC2626] transition-colors placeholder-gray-400">
                </div>

                <button type="submit" id="btnEnviar" class="w-full bg-[#DC2626] text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase hover:bg-[#DC2626]/90 transition-colors">
                    <i class="fas fa-paper-plane mr-2"></i> Enviar Código
                </button>

                <a href="{% url 'login' %}" class="text-center text-gray-400 hover:text-[#DC2626] text-sm font-bold transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i> Volver al login
                </a>
            </form>
        </div>
    </div>
</section>

<!-- TOAST -->
<div id="toast" class="fixed top-5 right-5 px-6 py-4 rounded-xl shadow-2xl text-white font-bold translate-x-[400px] transition-transform duration-300 z-50 bg-[#DC2626]">
    <span id="toastMessage"></span>
</div>

{% endblock %}
