{% extends 'base.html' %}
{% load static %}
{% block title %}Verificar Código - GastroWeb{% endblock %}
{% block content %}

<section class="min-h-screen bg-gray-100 flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-md">

        <div class="bg-white rounded-2xl shadow-md p-8">

            <!-- ENCABEZADO -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-linear-to-r from-[#DC2626] to-[#FF4500] rounded-full mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <h2 class="text-3xl font-black text-gray-900 mb-2">Código de Verificación</h2>
                <p class="text-gray-500 text-sm">Ingresa el código enviado a</p>
                <p class="text-[#DC2626] font-bold text-sm mt-1" id="emailMostrado">tu@email.com</p>
            </div>

            <!-- ✅ MENSAJE QUE SE AUTO-OCULTA -->
            <div id="mensajeEnviado" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-4 flex items-center gap-2 transition-opacity duration-500">
                <svg class="w-5 h-5 text-green-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
                <span class="text-sm font-bold">¡Código enviado! Revisa tu bandeja de entrada.</span>
            </div>

            <form id="formVerificar" class="flex flex-col gap-6">

                <!-- 6 CAJAS OTP -->
                <div>
                    <label class="text-gray-700 text-xs font-bold uppercase tracking-wider mb-3 block text-center">
                        Código de 6 dígitos
                    </label>
                    <div class="flex justify-center gap-2" id="otpContainer">
                        <input type="text" maxlength="1" inputmode="numeric" class="otp-input w-12 h-14 text-center text-2xl font-black border-2 border-gray-200 rounded-xl outline-none focus:border-[#DC2626] transition-colors text-gray-900">
                        <input type="text" maxlength="1" inputmode="numeric" class="otp-input w-12 h-14 text-center text-2xl font-black border-2 border-gray-200 rounded-xl outline-none focus:border-[#DC2626] transition-colors text-gray-900">
                        <input type="text" maxlength="1" inputmode="numeric" class="otp-input w-12 h-14 text-center text-2xl font-black border-2 border-gray-200 rounded-xl outline-none focus:border-[#DC2626] transition-colors text-gray-900">
                        <input type="text" maxlength="1" inputmode="numeric" class="otp-input w-12 h-14 text-center text-2xl font-black border-2 border-gray-200 rounded-xl outline-none focus:border-[#DC2626] transition-colors text-gray-900">
                        <input type="text" maxlength="1" inputmode="numeric" class="otp-input w-12 h-14 text-center text-2xl font-black border-2 border-gray-200 rounded-xl outline-none focus:border-[#DC2626] transition-colors text-gray-900">
                        <input type="text" maxlength="1" inputmode="numeric" class="otp-input w-12 h-14 text-center text-2xl font-black border-2 border-gray-200 rounded-xl outline-none focus:border-[#DC2626] transition-colors text-gray-900">
                    </div>
                </div>

                <!-- NUEVA CONTRASEÑA -->
                <div>
                    <label class="text-gray-700 text-xs font-bold uppercase tracking-wider mb-2 block">
                        <i class="fas fa-lock mr-2 text-[#DC2626]"></i>Nueva Contraseña
                    </label>
                    <div class="relative">
                        <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" class="w-full bg-gray-50 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 focus:border-[#DC2626] transition-colors placeholder-gray-400 pr-12">
                        <button type="button" onclick="togglePassword('newPassword', 'eye1')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#DC2626] transition-colors">
                            <i id="eye1" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- CONFIRMAR CONTRASEÑA -->
                <div>
                    <label class="text-gray-700 text-xs font-bold uppercase tracking-wider mb-2 block">
                        <i class="fas fa-lock mr-2 text-[#DC2626]"></i>Confirmar Contraseña
                    </label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" class="w-full bg-gray-50 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 focus:border-[#DC2626] transition-colors placeholder-gray-400 pr-12">
                        <button type="button" onclick="togglePassword('confirmPassword', 'eye2')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#DC2626] transition-colors">
                            <i id="eye2" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- MENSAJE -->
                <div id="mensaje" class="hidden p-4 rounded-xl text-sm font-bold"></div>

                <!-- BOTON -->
                <button type="submit" id="btnCambiar" class="w-full bg-[#DC2626] text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase hover:bg-[#DC2626]/90 transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-check-circle"></i>
                    Cambiar Contraseña
                </button>

            </form>

            <!-- REENVIAR -->
            <div class="mt-6 text-center">
                <a href="{% url 'enviar_codigo_web' %}" class="text-[#DC2626] hover:underline font-bold text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-arrow-left"></i>
                    Reenviar código
                </a>
            </div>

        </div>
    </div>
</section>

<script>

// Auto-ocultar mensaje de código enviado
const mensajeEnviado = document.getElementById('mensajeEnviado');
if (mensajeEnviado) {
    setTimeout(() => {
        mensajeEnviado.style.opacity = '0';
        setTimeout(() => {
            mensajeEnviado.style.display = 'none';
        }, 500); // espera a que termine el fade
    }, 5000); // desaparece a los 3 segundos
}
// OTP inputs
const otpInputs = document.querySelectorAll('.otp-input');
otpInputs.forEach((input, index) => {
    input.addEventListener('input', () => {
        if (input.value && !/^\d$/.test(input.value)) {
            input.value = '';
            return;
        }
        if (input.value && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
        }
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
            otpInputs[index - 1].focus();
        }
    });
});

// PASTE
document.getElementById('otpContainer').addEventListener('paste', (e) => {
    e.preventDefault();
    const pasted = e.clipboardData.getData('text').trim();
    if (/^\d{6}$/.test(pasted)) {
        otpInputs.forEach((input, i) => input.value = pasted[i]);
        otpInputs[5].focus();
    }
});

// SUBMIT
document.getElementById('formVerificar').addEventListener('submit', async (e) => {
    e.preventDefault();
    const codigo = [...otpInputs].map(i => i.value).join('');
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const mensaje = document.getElementById('mensaje');

    // Validaciones locales
    if (codigo.length !== 6) {
        mostrarMensaje(mensaje, 'error', 'Debes ingresar el código completo de 6 dígitos');
        return;
    }
    if (newPassword.length < 6) {
        mostrarMensaje(mensaje, 'error', 'La contraseña debe tener al menos 6 caracteres');
        return;
    }
    if (newPassword !== confirmPassword) {
        mostrarMensaje(mensaje, 'error', 'Las contraseñas no coinciden');
        return;
    }

    const email = "{{ request.session.email_recuperacion }}";
    const formData = new FormData();
    formData.append('email', email);
    formData.append('codigo', codigo);
    formData.append('password', newPassword);
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

    // ✅ fetch correcto — lee JSON de la vista
    try {
        const response = await fetch("{% url 'verificar_codigo_web' %}", {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (data.ok) {
            mostrarMensaje(mensaje, 'exito', '✅ Contraseña actualizada exitosamente. Redirigiendo...');
            setTimeout(() => {
                window.location.href = data.redirect;
            }, 2000);
        } else {
            mostrarMensaje(mensaje, 'error', data.error || 'Código inválido o expirado');
        }

    } catch (err) {
        mostrarMensaje(mensaje, 'error', 'Error de conexión. Intenta de nuevo.');
    }
});

function mostrarMensaje(el, tipo, texto) {
    el.classList.remove('hidden');
    el.textContent = texto;
    if (tipo === 'exito') {
        el.className = 'p-4 rounded-xl text-sm font-bold bg-green-50 text-green-700 border border-green-200';
    } else {
        el.className = 'p-4 rounded-xl text-sm font-bold bg-red-50 text-red-700 border border-red-200';
    }
}

function togglePassword(inputId, eyeId) {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    if (input.type === 'password') {
        input.type = 'text';
        eye.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        eye.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

// Muestra el email guardado en sesión
const email = "{{ request.session.email_recuperacion }}";
document.getElementById('emailMostrado').textContent = email || 'tu@email.com';
</script>

{% endblock %}
