{% extends 'base.html' %}
{% load static %}
{% block title %}Menú Beer Club - GastroWeb{% endblock %}
{% block content %}

<section class="bg-white min-h-screen px-16 py-12">
    <h2 class="text-4xl font-black text-gray-900 text-center mb-2">Menú Beer Club</h2>
    <p class="text-gray-400 text-center text-xs tracking-widest uppercase mb-12">NUESTRO MENÚ</p>

    <div class="grid grid-cols-3 gap-6 max-w-3xl mx-auto">

        <div class="bg-[#E89C3F] rounded-3xl overflow-hidden cursor-pointer hover:-translate-y-2 transition-all p-3">
            <div class="h-40 mb-3">
                <img src="{% static 'img/burger.png' %}" alt="Burger" class="w-full h-full object-contain rounded-2xl">
            </div>
            <div class="border-t-2 border-black mb-3"></div>
           <button onclick="window.location='{% url 'burgers' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">
    BURGERS
</button>
        </div>

        <div class="bg-[#E89C3F] rounded-3xl overflow-hidden cursor-pointer hover:-translate-y-2 transition-all p-3">
            <div class="h-40 mb-3">
               <img src="{% static 'img/Entradas.png' %}" alt="Entradas" class="w-full h-full object-contain rounded-2xl">
            </div>
            <div class="border-t-2 border-black mb-3"></div>
           <button onclick="window.location='{% url 'entradas' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">
    ENTRADAS</button>
            </button>
        </div>

        <div class="bg-[#E89C3F] rounded-3xl overflow-hidden cursor-pointer hover:-translate-y-2 transition-all p-3">
            <div class="h-40 mb-3">
                 <img src="{% static 'img/Comida.png' %}" alt="Comida" class="w-full h-full object-contain rounded-2xl">
            </div>
            <div class="border-t-2 border-black mb-3"></div>
           <button onclick="window.location='{% url 'comidas_rapidas' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">
    COMIDAS RAPIDAS</button>
        </div>

        <div class="bg-[#E89C3F] rounded-3xl overflow-hidden cursor-pointer hover:-translate-y-2 transition-all p-3">
            <div class="h-40 mb-3">
               <img src="{% static 'img/Comidas.png' %}" alt="Comidas" class="w-full h-full object-contain rounded-2xl">
            </div>
            <div class="border-t-2 border-black mb-3"></div>
          <button onclick="window.location='{% url 'especiales_beer' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">
    ESPECIALES BEER CLUB</button>
        </div>

        <div class="bg-[#E89C3F] rounded-3xl overflow-hidden cursor-pointer hover:-translate-y-2 transition-all p-3">
            <div class="h-40 mb-3">
                 <img src="{% static 'img/Picada.png' %}" alt="Picada" class="w-full h-full object-contain rounded-2xl">
            </div>
            <div class="border-t-2 border-black mb-3"></div>
            <button onclick="window.location='{% url 'picadas' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">
                PICADAS
            </button>
        </div>

        <div class="bg-[#E89C3F] rounded-3xl overflow-hidden cursor-pointer hover:-translate-y-2 transition-all p-3">
            <div class="h-40 mb-3">
                <img src="{% static 'img/Bebidas.png' %}" alt="Bebidas" class="w-full h-full object-contain rounded-2xl">
            </div>
            <div class="border-t-2 border-black mb-3"></div>
            <button onclick="window.location='{% url 'bebidas' %}'" class="w-full bg-white rounded-2xl py-3 text-center font-black text-lg text-gray-900 hover:bg-gray-50 transition-colors">
                BEBIDAS
            </button>
        </div>

    </div>
</section>

{% endblock %}
