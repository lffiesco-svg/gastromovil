{% extends 'base.html' %}
{% load static %}
{% block title %}Mi Perfil - GastroWeb{% endblock %}
{% block content %}

<section class="min-h-screen bg-gray-100 px-6 md:px-16 py-16">

    <div class="bg-white rounded-3xl shadow-md p-8 max-w-2xl mx-auto">
        
        <!-- ICONO PERFIL Y NOMBRE -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-24 h-24 rounded-full bg-gray-100 border-4 border-[#FF8C00] flex items-center justify-center mb-4">
                <i class="fas fa-circle-user text-gray-400 text-6xl"></i>
            </div>
            <h2 class="text-gray-900 font-black text-2xl">Luis Felipe</h2>
            <p class="text-gray-400 text-sm">gastromovil@gmail.com</p>
        </div>

        <h3 class="text-gray-900 font-black text-xl mb-6 flex items-center gap-3">
            <i class="fas fa-user-pen text-[#FF8C00]"></i> Datos Personales
        </h3>

        <div class="flex flex-col gap-5">

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                        <i class="fas fa-user mr-2 text-[#FF8C00]"></i>Nombre
                    </label>
                    <input type="text" value="Luis Felipe" class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 focus:border-[#FF8C00] transition-colors">
                </div>
                <div>
                    <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                        <i class="fas fa-user mr-2 text-[#FF8C00]"></i>Apellidos
                    </label>
                    <input type="text" value="Fiesco" class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 focus:border-[#FF8C00] transition-colors">
                </div>
            </div>

            <div>
                <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                    <i class="fas fa-envelope mr-2 text-[#FF8C00]"></i>Correo Electrónico
                </label>
                <input type="email" value="gastromovil@gmail.com" class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 focus:border-[#FF8C00] transition-colors">
            </div>

            <div>
                <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                    <i class="fas fa-phone mr-2 text-[#FF8C00]"></i>Teléfono
                </label>
                <input type="tel" value="+57 320 846 0726" class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl outline-none border border-gray-200 focus:border-[#FF8C00] transition-colors">
            </div>

            <button class="w-full bg-[#FF8C00] text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase hover:bg-[#e67e00] transition-colors mt-2">
                <i class="fas fa-user-pen mr-2"></i> Editar Perfil
            </button>

        </div>
    </div>

</section>

{% endblock %}
