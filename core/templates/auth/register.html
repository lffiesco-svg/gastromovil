{% extends 'base.html' %}
{% load static %}
{% block title %}Registro - GastroWeb{% endblock %}
{% block content %}

<section class="bg-[#1a0a0a] min-h-screen flex items-center justify-center px-6 py-16">
    <div class="bg-[#2a1010] border border-[#4a2020] rounded-3xl p-10 w-full max-w-xl">
        
        <!-- LOGO -->
        <div class="flex justify-center mb-6">
            <img src="{% static 'img/Logo.jpeg' %}" alt="GastroWeb" class="w-20 h-20 rounded-full object-cover border-2 border-[#DC2626]">
        </div>

        <!-- TITULO -->
        <p class="text-[#DC2626] text-xs font-bold tracking-widest uppercase text-center mb-2">ÚNETE A NOSOTROS</p>
        <h2 class="text-3xl font-black text-white text-center mb-2">CREAR CUENTA</h2>
        <p class="text-gray-400 text-sm text-center mb-8">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-[#DC2626] hover:underline font-bold">Inicia Sesión</a>
        </p>

        <!-- FORMULARIO -->
        <div class="flex flex-col gap-5">

            <!-- NOMBRE Y APELLIDO -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                        <i class="fas fa-user mr-2 text-[#DC2626]"></i>Nombre
                    </label>
                    <input type="text" placeholder="Tu nombre" class="w-full bg-[#1a0a0a] text-white px-4 py-3 rounded-xl outline-none border border-[#4a2020] focus:border-[#DC2626] transition-colors placeholder-gray-600">
                </div>
                <div>
                    <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                        <i class="fas fa-user mr-2 text-[#DC2626]"></i>Apellidos
                    </label>
                    <input type="text" placeholder="Tus apellidos" class="w-full bg-[#1a0a0a] text-white px-4 py-3 rounded-xl outline-none border border-[#4a2020] focus:border-[#DC2626] transition-colors placeholder-gray-600">
                </div>
            </div>

            <!-- CORREO -->
            <div>
                <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                    <i class="fas fa-envelope mr-2 text-[#DC2626]"></i>Correo Electrónico
                </label>
                <input type="email" placeholder="correo@ejemplo.com" class="w-full bg-[#1a0a0a] text-white px-4 py-3 rounded-xl outline-none border border-[#4a2020] focus:border-[#DC2626] transition-colors placeholder-gray-600">
            </div>

            <!-- TELEFONO -->
            <div>
                <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                    <i class="fas fa-phone mr-2 text-[#DC2626]"></i>Teléfono
                </label>
                <input type="tel" placeholder="+57 300 000 0000" class="w-full bg-[#1a0a0a] text-white px-4 py-3 rounded-xl outline-none border border-[#4a2020] focus:border-[#DC2626] transition-colors placeholder-gray-600">
            </div>

            <!-- CONTRASEÑA -->
            <div>
                <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                    <i class="fas fa-lock mr-2 text-[#DC2626]"></i>Contraseña
                </label>
                <div class="relative">
                    <input type="password" id="password1" placeholder="••••••••" class="w-full bg-[#1a0a0a] text-white px-4 py-3 rounded-xl outline-none border border-[#4a2020] focus:border-[#DC2626] transition-colors placeholder-gray-600 pr-12">
                    <button type="button" onclick="togglePassword('password1', 'eye1')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#DC2626] transition-colors">
                        <i id="eye1" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- CONFIRMAR CONTRASEÑA -->
            <div>
                <label class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 block">
                    <i class="fas fa-lock mr-2 text-[#DC2626]"></i>Confirmar Contraseña
                </label>
                <div class="relative">
                    <input type="password" id="password2" placeholder="••••••••" class="w-full bg-[#1a0a0a] text-white px-4 py-3 rounded-xl outline-none border border-[#4a2020] focus:border-[#DC2626] transition-colors placeholder-gray-600 pr-12">
                    <button type="button" onclick="togglePassword('password2', 'eye2')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#DC2626] transition-colors">
                        <i id="eye2" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- TERMINOS -->
            <div class="flex items-start gap-3">
                <input type="checkbox" id="terminos" class="mt-1 w-4 h-4 accent-[#DC2626] cursor-pointer">
                <label for="terminos" class="text-gray-400 text-sm cursor-pointer">
                    Acepto los <a href="#" class="text-[#DC2626] hover:underline font-bold">términos y condiciones</a> y la <a href="#" class="text-[#DC2626] hover:underline font-bold">política de privacidad</a>
                </label>
            </div>

            <!-- BOTON REGISTRARSE -->
            <button class="w-full bg-[#DC2626] text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase hover:bg-[#DC2626]/90 transition-colors">
                <i class="fas fa-user-plus mr-2"></i> Registrarse
            </button>

            <!-- DIVISOR -->
            <div class="flex items-center gap-4">
                <div class="flex-1 border-t border-[#4a2020]"></div>
                <span class="text-gray-500 text-xs">O regístrate con</span>
                <div class="flex-1 border-t border-[#4a2020]"></div>
            </div>

            <!-- REDES SOCIALES -->
            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-gray-800 py-3 rounded-xl font-bold text-sm transition-colors">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    Google
                </button>
                <button class="flex items-center justify-center gap-3 bg-[#1877F2] hover:bg-[#0d5dbf] text-white py-3 rounded-xl font-bold text-sm transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
            </div>

        </div>
    </div>
</section>

<script src="{% static 'js/main.js' %}"></script>

{% endblock %}
